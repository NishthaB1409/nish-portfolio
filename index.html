<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Nishtha Bhagyawant is an AI Engineer specializing in LLMs, RAG pipelines, computer vision, FastAPI services, and AWS deployment."
    />
    <title>Nishtha Bhagyawant | AI Engineer</title>
    <script>
      // Apply saved theme/language before first paint to avoid a flash.
      (function () {
        try {
          var theme = localStorage.getItem("theme");
          if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
          }
          var lang = localStorage.getItem("lang");
          if (lang === "de" || lang === "en") {
            document.documentElement.lang = lang;
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
